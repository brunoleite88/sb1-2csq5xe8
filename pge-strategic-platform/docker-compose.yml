version: '3.8'

services:
  # Banco de Dados MySQL 8.0 (Versão Atual e Gratuita)
  database:
    image: mysql:8.0
    container_name: pge_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-pge2024root}
      MYSQL_DATABASE: ${DB_NAME:-pge_strategic}
      MYSQL_USER: ${DB_USER:-pge_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pge2024pass}
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - pge_db_data:/var/lib/mysql
    networks:
      - pge_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot (Java 17 LTS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pge_backend
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/${DB_NAME:-pge_strategic}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-pge_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-pge2024pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_LIQUIBASE_ENABLED: true
      JWT_SECRET: ${JWT_SECRET:-pge-secret-key-change-in-production-2024}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      FRONTEND_URL: http://localhost
      SERVER_PORT: 8080
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY:-}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "8080:8080"
    networks:
      - pge_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Frontend React (Nginx Alpine)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8080/api
        REACT_APP_RECAPTCHA_KEY: ${RECAPTCHA_SITE_KEY:-}
    container_name: pge_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - pge_network
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  pge_network:
    driver: bridge

volumes:
  pge_db_data:
    driver: local
